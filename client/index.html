<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Scientist Shield – tutorials, problems, quizzes, and tools to learn and practice computer science and programming." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#eef6ff" data-dynamic-theme-color="true" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" data-dynamic-status-bar="true" />
    <meta name="application-name" content="Scientist Shield" />
    <meta name="apple-mobile-web-app-title" content="SciShield" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="/favicon.svg" color="#1677ff" />
    <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials" />
    <script>
      (() => {
        const root = document.documentElement;
        const UI_EFFECTS_STORAGE_KEY = 'ui.effects.v1';
        const SURFACE_CLASS_MAP = {
          hybrid: 'macos-hybrid',
          liquid: 'macos-liquid',
          sequoia: 'macos-sequoia',
          graphite: 'macos-graphite',
          aurora: 'macos-aurora',
          eclipse: 'macos-eclipse',
        };
        const LEGACY_SURFACE_PRESET_ALIASES = {
          'liquid-glass': 'liquid',
          'frosted-glass': 'sequoia',
        };
        const ACCENT_PRESETS = {
          blue: {
            color: '#0A84FF',
            strong: '#0369D4',
            gradient: 'linear-gradient(135deg, rgba(14,116,244,0.9), rgba(56,189,248,0.7))',
          },
          pink: {
            color: '#EC4899',
            strong: '#DB2777',
            gradient: 'linear-gradient(135deg, rgba(236,72,153,0.9), rgba(168,85,247,0.72))',
          },
          mint: {
            color: '#0FB583',
            strong: '#0F766E',
            gradient: 'linear-gradient(135deg, rgba(16,185,129,0.9), rgba(59,130,246,0.65))',
          },
          amber: {
            color: '#F59E0B',
            strong: '#C2410C',
            gradient: 'linear-gradient(135deg, rgba(245,158,11,0.92), rgba(249,115,22,0.8))',
          },
          violet: {
            color: '#7C5CFF',
            strong: '#5B3DF2',
            gradient: 'linear-gradient(135deg, rgba(124,92,255,0.92), rgba(56,189,248,0.72))',
          },
          coral: {
            color: '#FF7A59',
            strong: '#E85D3A',
            gradient: 'linear-gradient(135deg, rgba(255,122,89,0.92), rgba(244,114,182,0.74))',
          },
          indigo: {
            color: '#6366F1',
            strong: '#4338CA',
            gradient: 'linear-gradient(135deg, rgba(99,102,241,0.92), rgba(168,85,247,0.74))',
          },
          graphite: {
            color: '#111827',
            strong: '#0F172A',
            gradient: 'linear-gradient(135deg, rgba(30,41,59,0.95), rgba(15,23,42,0.9))',
          },
        };
        const readMediaQuery = (query) => window.matchMedia && window.matchMedia(query).matches;
        const normalizeAccent = (value = '') => {
          const normalized = String(value).trim();
          if (/^#[0-9a-f]{3}$/i.test(normalized)) {
            return `#${normalized.slice(1).split('').map((segment) => `${segment}${segment}`).join('')}`.toLowerCase();
          }
          return /^#[0-9a-f]{6}$/i.test(normalized) ? normalized.toLowerCase() : '';
        };
        const hexToRgb = (value) => ({
          red: Number.parseInt(value.slice(1, 3), 16),
          green: Number.parseInt(value.slice(3, 5), 16),
          blue: Number.parseInt(value.slice(5, 7), 16),
        });
        const rgbToHex = ({ red, green, blue }) =>
          `#${[red, green, blue].map((channel) => Math.min(Math.max(Math.round(channel), 0), 255).toString(16).padStart(2, '0')).join('')}`;
        const mixHex = (source, target, amount) => {
          const sourceRgb = hexToRgb(source);
          const targetRgb = hexToRgb(target);
          return rgbToHex({
            red: sourceRgb.red + ((targetRgb.red - sourceRgb.red) * amount),
            green: sourceRgb.green + ((targetRgb.green - sourceRgb.green) * amount),
            blue: sourceRgb.blue + ((targetRgb.blue - sourceRgb.blue) * amount),
          });
        };
        const toRgba = (value, alpha) => {
          const { red, green, blue } = hexToRgb(value);
          return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
        };
        const deriveCustomAccent = (value) => {
          const color = normalizeAccent(value) || '#7c8cff';
          const soft = mixHex(color, '#ffffff', 0.18);
          const strong = mixHex(color, '#0f172a', 0.28);
          return {
            color,
            strong,
            gradient: `linear-gradient(135deg, ${toRgba(soft, 0.96)}, ${toRgba(color, 0.9)}, ${toRgba(strong, 0.88)})`,
          };
        };
        const prefersContrast = readMediaQuery('(prefers-contrast: more)');
        const forcedColors = readMediaQuery('(forced-colors: active)');
        const reducedMotion = readMediaQuery('(prefers-reduced-motion: reduce)');
        const systemTheme = readMediaQuery('(prefers-color-scheme: dark)') ? 'dark' : 'light';
        let effects = {};

        try {
          effects = JSON.parse(window.localStorage.getItem(UI_EFFECTS_STORAGE_KEY) || 'null') || {};
        } catch {
          effects = {};
        }

        const themeMode = ['system', 'light', 'dark'].includes(effects.themeMode) ? effects.themeMode : 'system';
        const resolvedTheme = themeMode === 'system' ? systemTheme : themeMode;
        const requestedSurfacePreset = LEGACY_SURFACE_PRESET_ALIASES[effects.surfacePreset] || effects.surfacePreset;
        const surfacePreset = Object.prototype.hasOwnProperty.call(SURFACE_CLASS_MAP, requestedSurfacePreset)
          ? requestedSurfacePreset
          : 'hybrid';
        const surfaceClass = SURFACE_CLASS_MAP[surfacePreset];
        const accentPreset = effects.accentPreset === 'custom' ? 'custom' : Object.prototype.hasOwnProperty.call(ACCENT_PRESETS, effects.accentPreset) ? effects.accentPreset : 'system';
        const accent = accentPreset === 'custom' ? deriveCustomAccent(effects.customAccent) : ACCENT_PRESETS[accentPreset];

        root.classList.remove(
          'light',
          'dark',
          'macos-hybrid',
          'macos-sequoia',
          'macos-liquid',
          'macos-graphite',
          'macos-aurora',
          'macos-eclipse',
          'liquid-glass'
        );
        root.classList.add(resolvedTheme);
        root.classList.add('bigsur');
        root.classList.add(surfaceClass);
        root.classList.add('liquid-glass');
        root.setAttribute('data-theme', 'liquid-glass');
        root.setAttribute('data-theme-mode', themeMode);
        root.setAttribute('data-resolved-theme', resolvedTheme);
        root.setAttribute('data-surface-preset', surfacePreset);
        root.setAttribute('data-accent-preset', accentPreset);
        root.setAttribute('data-contrast-preference', prefersContrast ? 'more' : 'no-preference');
        root.setAttribute('data-forced-colors', forcedColors ? 'active' : 'none');
        root.setAttribute('data-reduced-motion', reducedMotion ? 'reduce' : 'no-preference');
        root.style.setProperty('color-scheme', resolvedTheme);
        if (accent) {
          root.style.setProperty('--color-accent', accent.color);
          root.style.setProperty('--color-accent-strong', accent.strong);
          root.style.setProperty('--color-accent-gradient', accent.gradient);
          root.style.setProperty('--liquid-accent', accent.color);
          root.style.setProperty('--liquid-accent-secondary', accent.strong);
          if (accentPreset === 'custom') {
            root.setAttribute('data-custom-accent', accent.color);
          }
        }
        let meta = document.querySelector('meta[name="theme-color"][data-dynamic-theme-color="true"]');
        if (!meta) {
          meta = document.createElement('meta');
          meta.setAttribute('name', 'theme-color');
          meta.setAttribute('data-dynamic-theme-color', 'true');
          document.head.appendChild(meta);
        }
        meta.setAttribute('content', resolvedTheme === 'dark' ? '#0b1120' : '#eef6ff');
        let statusMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"][data-dynamic-status-bar="true"]');
        if (!statusMeta) {
          statusMeta = document.createElement('meta');
          statusMeta.setAttribute('name', 'apple-mobile-web-app-status-bar-style');
          statusMeta.setAttribute('data-dynamic-status-bar', 'true');
          document.head.appendChild(statusMeta);
        }
        statusMeta.setAttribute('content', resolvedTheme === 'dark' ? 'black-translucent' : 'default');
      })();
    </script>
    <title>Scientist Shield</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
