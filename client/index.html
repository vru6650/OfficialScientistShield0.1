<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Scientist Shield – tutorials, problems, quizzes, and tools to learn and practice computer science and programming." />
    <!-- Big Sur white theme foreground colors for browser UI -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="application-name" content="Scientist Shield" />
    <meta name="apple-mobile-web-app-title" content="SciShield" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="/favicon.svg" color="#174878" />
    <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials" />
    <script>
      (() => {
        const root = document.documentElement;
        const read = (key) => {
          try { return window.localStorage.getItem(key); } catch { return null; }
        };
        const write = (key, value) => {
          try { window.localStorage.setItem(key, value); } catch { /* ignore quota/private mode */ }
        };
        const storedMode = read('themeMode');
        const mode = ['light', 'dark', 'auto'].includes(storedMode) ? storedMode : 'auto';
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = mode === 'light' ? 'light' : mode === 'dark' ? 'dark' : (prefersDark ? 'dark' : 'light');
        root.classList.remove('light', 'dark');
        root.classList.add(theme);
        root.setAttribute('data-theme', 'liquid-glass');
        root.setAttribute('data-theme-mode', mode);
        root.style.setProperty('color-scheme', theme);
        write('themeMode', mode);
        write('theme', theme);
      })();
    </script>
    <title>Scientist Shield</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
